name: research-template
version: 1.0.0
description: APM project for research-template
author: Daniel Saad
license: MIT
target: claude
dependencies:
  apm:
  - anthropics/skills/skills/pdf
  - ./.apm/skills/argdown
  - ./.apm/skills/llm-wiki
  mcp:
  - name: parallel-search
    registry: false
    transport: http
    url: https://search-mcp.parallel.ai/mcp
  - name: deepwiki
    registry: false
    transport: http
    url: https://mcp.deepwiki.com/mcp
scripts:
  sync-claude: "bash scripts/sync-claude.sh"
  sync-claude:win: "pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/sync-claude.ps1"
